name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: oceano-linux.tar.gz
            artifact_name: oceano-linux
          - os: windows-latest
            asset_name: oceano-windows.zip
            artifact_name: oceano-windows
          - os: macos-latest
            asset_name: oceano-macos.tar.gz
            artifact_name: oceano-macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          activate-environment: oceano-build
          python-version: "3.10"
          auto-activate-base: false
          channels: conda-forge,defaults

      - name: Install build dependencies
        shell: bash -el {0}
        run: |
          conda install -y numpy netCDF4 toml matplotlib xarray seawater pyinstaller tk
          python -m pip install --upgrade pip
          python -m pip install notanorm

      - name: Verify build environment
        shell: bash -el {0}
        run: |
          which python
          python --version
          python -m pip --version
          python -c "import notanorm; import netCDF4; print('build env ok')"

      - name: Build executable
        shell: bash -el {0}
        run: pyinstaller -wF --clean oceano.py

      - name: Package Linux/macOS artifact
        if: runner.os != 'Windows'
        shell: bash -el {0}
        run: tar -C dist -czf "dist/${{ matrix.asset_name }}" oceano

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist\oceano.exe -DestinationPath "dist\${{ matrix.asset_name }}" -Force

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 7

      - name: Publish release asset
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash -el {0}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || gh release create "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" "dist/${{ matrix.asset_name }}" --clobber
